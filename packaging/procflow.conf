[logging]
# Absolute path to the JSON log file
log_file = /var/log/procflow/enriched_flow.log

# Maximum log file size in bytes before rotation (default: 50 MB)
max_bytes = 52428800

# Number of rotated log files to keep
# With 50 MB per file and 5 backups, maximum disk usage is 250 MB
backup_count = 5

[tuning]
# Seconds to hold an inbound flow in PAM-pending after the first PAM match.
# Allows PAM_SERVICE to arrive after PAM_USER on some sshd configurations.
# pam_collect_secs = 1.0

# Maximum seconds to wait for PAM enrichment before emitting without it.
# pam_window_secs = 15.0

# TCP/UDP connections open longer than this (seconds) emit a flow_long_open record.
# flow_short_secs = 30.0

# Maximum seconds to track an open flow before evicting it from memory.
# flow_track_secs = 3600.0

[filter]
# Suppress specific process→destination flows from the log.
# Each rule matches on process name, destination IP, and destination port (all three
# must match). Other connections from the same process are still logged.
#
# Useful for breaking feedback loops: if a log shipper (e.g. Elastic Agent) is
# sending procflow's log file to a remote server, procflow will log those connections,
# which the shipper then sends again. Add a rule for each shipper→server connection
# to break the loop.
#
# Format: one rule per line — process_name, dst_ip, dst_port
# (continuation lines must be indented)
#
# Example — suppress Elastic Agent log shipping to an Elasticsearch/Fleet server:
# suppress =
#     agentbeat, 10.10.20.18, 9200
#     elastic-agent, 10.10.20.18, 8220
